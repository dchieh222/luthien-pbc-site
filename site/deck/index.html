<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luthien: Investor Deck</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Lora:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #141216;
      --bg-elevated: #1A1720;
      --surface: #201C2A;
      --border: #28243A;
      --text: #EDE5D8;
      --text-dim: #9A92AE;
      --blue: #3B9494;
      --blue-glow: rgba(59, 148, 148, 0.15);
      --red: #C45050;
      --sans: 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
      --body: 'Lora', Georgia, serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(3rem, 8vw, 5rem);
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 10%;
      right: 10%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    .tagline {
      font-family: var(--body);
      font-size: clamp(1rem, 2vw, 1.35rem);
      color: var(--text-dim);
      margin-top: 20px;
    }

    .gate {
      text-align: center;
      margin-top: 48px;
      max-width: 360px;
      width: 100%;
    }

    .pw-form {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .pw-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .pw-input::placeholder { color: var(--text-dim); }
    .pw-input:focus { border-color: var(--blue); }

    .pw-input.error {
      border-color: var(--red);
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .pw-btn {
      padding: 12px 20px;
      background: var(--blue-glow);
      border: 1px solid var(--blue);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .pw-btn:hover {
      background: rgba(59, 148, 148, 0.28);
    }

    .request-link {
      display: inline-block;
      margin-top: 24px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      background: none;
      border: none;
      border-bottom: 1px solid rgba(154, 146, 174, 0.3);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      position: relative;
      z-index: 10;
      padding: 0;
    }

    .request-link:hover {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <a href="https://scottwofford.com/" target="_blank" style="position: fixed; top: 20px; left: 24px; font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); text-decoration: none; opacity: 0.6; transition: opacity 0.2s; z-index: 50; letter-spacing: 0.02em;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">scottwofford.com</a>
  <div class="logo">Luthien</div>
  <p class="tagline">Making it safe to run AI at full speed</p>

  <div class="gate">
    <form class="pw-form" onsubmit="return checkPassword(event)">
      <input type="text" class="pw-input" id="pw" placeholder="Password" autocomplete="off" data-1p-ignore data-lpignore="true" data-bwignore data-form-type="other" autofocus>
      <button type="submit" class="pw-btn">&rarr;</button>
    </form>
    <button class="request-link" id="requestBtn" onclick="copyRequest()">Request access</button>
  </div>

<script>
// SHA-256 hash of the password. To change the password, run in browser console:
// crypto.subtle.digest('SHA-256', new TextEncoder().encode('yourpassword')).then(b => console.log(Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('')))
const HASH = '0fcd568a5cb9bdb4677b69354b11ee415af8f784519cff3da49a26f84eaee7f2';

var copyTimer;
function copyRequest() {
  const text = 'To: scott@luthienresearch.org\nSubject: Deck access request\n\nHi Scott,\n\nI\'m [Name] from [Organization], and I\'d like access to your deck please.\n\n[Please provide relevant context]';
  var btn = document.getElementById('requestBtn');
  clearTimeout(copyTimer);
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Email draft copied to your clipboard';
    btn.style.color = 'var(--blue)';
    btn.style.borderBottomColor = 'var(--blue)';
    copyTimer = setTimeout(function() {
      btn.textContent = 'Request access';
      btn.style.color = '';
      btn.style.borderBottomColor = '';
    }, 2000);
  });
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0')).join('');
}

async function checkPassword(e) {
  e.preventDefault();
  const input = document.getElementById('pw');
  const hash = await sha256(input.value);
  if (hash === HASH) {
    var slide = window.location.hash || '#team';
    document.body.style.padding = '0';
    document.body.style.overflow = 'hidden';
    document.body.innerHTML = '<iframe id="deckFrame" src="/pitch/' + slide + '" style="width:100%;height:100%;border:none;position:fixed;inset:0;"></iframe>';
    // Sync hash changes from iframe back to parent URL
    var frame = document.getElementById('deckFrame');
    frame.addEventListener('load', function() {
      try {
        var iw = frame.contentWindow;
        iw.addEventListener('hashchange', function() {
          history.replaceState(null, '', '/deck/' + iw.location.hash);
        });
      } catch(e) {}
    });
  } else {
    input.classList.add('error');
    input.value = '';
    input.placeholder = 'Try again';
    setTimeout(() => input.classList.remove('error'), 400);
  }
  return false;
}
</script>

<script data-goatcounter="https://luthien.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
