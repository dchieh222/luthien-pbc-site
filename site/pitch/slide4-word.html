<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Why Luthien? — Slide 4</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FFFFFF;
      color: #1A1720;
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      padding: 60px 40px;
    }

    .slide {
      max-width: 720px;
      width: 100%;
    }

    .label {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3B9494;
      margin-bottom: 12px;
    }

    .headline {
      font-family: 'Raleway', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.15;
      color: #1A1720;
      margin-bottom: 40px;
    }

    .items {
      border-top: 1px solid #D8D4DE;
    }

    .item {
      display: flex;
      align-items: baseline;
      gap: 18px;
      padding: 18px 0;
      border-bottom: 1px solid #D8D4DE;
    }

    .bullet {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3B9494;
      flex-shrink: 0;
      position: relative;
      top: -2px;
    }

    .item-text {
      font-family: 'Raleway', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: #1A1720;
    }

    @media print {
      body { padding: 40px 20px; }
      .headline { font-size: 1.8rem; }
      .item-text { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="label">Why Luthien?</div>
    <h1 class="headline">Org-Wide AI Control &amp; Protection</h1>
    <div class="items">
      <div class="item">
        <span class="bullet"></span>
        <span class="item-text">Full Control Over All AI Agents</span>
      </div>
      <div class="item">
        <span class="bullet"></span>
        <span class="item-text">Intuitive, Fine-Grained Policy</span>
      </div>
      <div class="item">
        <span class="bullet"></span>
        <span class="item-text">Instant Rollouts, Even Mid-Workflow</span>
      </div>
      <div class="item">
        <span class="bullet"></span>
        <span class="item-text">Guaranteed Compliance</span>
      </div>
      <div class="item">
        <span class="bullet"></span>
        <span class="item-text">Frictionless User Experience</span>
      </div>
      <div class="item">
        <span class="bullet"></span>
        <span class="item-text">Effortless Observability</span>
      </div>
    </div>
  </div>
</body>
</html>
