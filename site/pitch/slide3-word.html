<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How It Works — Slide 3</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Lora:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FFFFFF;
      --text: #1A1720;
      --text-muted: #6B6378;
      --text-dim: #9990A8;
      --blue: #3B9494;
      --amber: #C47B42;
      --border: #D8D4DE;
      --box-bg: #F7F5FA;
      --sans: 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
      --body: 'Lora', Georgia, 'Times New Roman', serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      display: flex;
      justify-content: center;
      padding: 60px 40px;
    }

    .slide {
      max-width: 800px;
      width: 100%;
      text-align: center;
    }

    .label {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
      text-align: left;
    }

    .headline {
      font-family: var(--sans);
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 8px;
      text-align: left;
    }

    .subtitle {
      font-family: var(--body);
      font-size: 1.1rem;
      color: var(--text-muted);
      text-align: left;
      margin-bottom: 40px;
    }

    /* Architecture boxes */
    .arch-box {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      background: var(--box-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 18px;
      text-align: center;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      width: 160px;
    }

    .arch-box.luthien {
      border-color: var(--blue);
      background: rgba(59, 148, 148, 0.08);
      color: var(--blue);
      font-weight: 700;
      width: 100%;
    }

    /* Connectors */
    .arch-connector {
      width: 36px;
      height: 2px;
      background: var(--border);
      position: relative;
      flex-shrink: 0;
      margin: 0 8px;
    }

    .arch-connector::before {
      content: '';
      position: absolute;
      left: -6px;
      top: -3px;
      width: 0;
      height: 0;
      border: 4px solid transparent;
      border-right: 5px solid var(--border);
    }

    .arch-connector::after {
      content: '';
      position: absolute;
      right: -6px;
      top: -3px;
      width: 0;
      height: 0;
      border: 4px solid transparent;
      border-left: 5px solid var(--border);
    }

    .arch-connector.accent { background: var(--blue); }
    .arch-connector.accent::before { border-right-color: var(--blue); }
    .arch-connector.accent::after { border-left-color: var(--blue); }
    .arch-connector.accent-amber { background: var(--amber); }
    .arch-connector.accent-amber::before { border-right-color: var(--amber); }
    .arch-connector.accent-amber::after { border-left-color: var(--amber); }
    .arch-connector.wide { width: 48px; }

    /* Row layout */
    .flow-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0;
    }

    .row-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: 56px;
      flex-shrink: 0;
      text-align: right;
      padding-right: 16px;
      padding-top: 14px;
    }

    .luthien-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 160px;
    }

    .luthien-caption {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 8px;
    }

    .divider {
      border-top: 1px solid var(--border);
      margin: 0 80px;
    }

    .latency-badge {
      font-size: 0.68rem;
      color: var(--blue);
      background: rgba(59, 148, 148, 0.08);
      border: 1px solid rgba(59, 148, 148, 0.25);
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
      font-family: var(--mono);
    }

    @media print {
      body { padding: 40px 20px; }
      .headline { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="label">How It Works</div>
    <h1 class="headline">A proxy between LLM APIs<br>and your dev environment</h1>
    <p class="subtitle">Log every request &amp; response. Enforce custom rules.</p>

    <!-- DEV row -->
    <div style="margin-bottom: 20px;">
      <div class="flow-row">
        <div class="row-label" style="color: var(--blue);">Dev</div>
        <div class="arch-box">&#x1F9D1;&#x200D;&#x1F4BB; User</div>
        <div class="arch-connector accent" style="margin-top: 18px;"></div>
        <div class="arch-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><g stroke="#D97757" stroke-width="1.6" stroke-linecap="round"><line x1="12" y1="12" x2="12" y2="2"/><line x1="12" y1="12" x2="19.1" y2="4.9"/><line x1="12" y1="12" x2="22" y2="12"/><line x1="12" y1="12" x2="17.5" y2="19.5"/><line x1="12" y1="12" x2="12" y2="22"/><line x1="12" y1="12" x2="4.9" y2="19.1"/><line x1="12" y1="12" x2="2" y2="12"/><line x1="12" y1="12" x2="4.9" y2="4.9"/><line x1="12" y1="12" x2="7" y2="3"/><line x1="12" y1="12" x2="21" y2="7"/><line x1="12" y1="12" x2="17" y2="21"/><line x1="12" y1="12" x2="3" y2="17"/></g></svg>
          Claude Code
        </div>
        <div class="arch-connector accent wide" style="margin-top: 18px;"></div>
        <div class="luthien-col">
          <div class="arch-box luthien">Luthien</div>
          <div class="luthien-caption" style="white-space: nowrap;">did it do what I asked?</div>
        </div>
        <div class="arch-connector accent wide" style="margin-top: 18px;"></div>
        <div class="arch-box">
          <svg width="16" height="16" viewBox="0 7 46 32" fill="none"><path d="M32.73 7h-6.945L38.45 39h6.945L32.73 7ZM12.665 7 0 39h7.082l2.59-6.72h13.25l2.59 6.72h7.082L19.929 7h-7.264Zm-.702 19.337 4.334-11.246 4.334 11.246h-8.668Z" fill="#C47B42"/></svg>
          Anthropic API
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- ORG row -->
    <div style="margin-top: 40px;">
      <div class="flow-row">
        <div class="row-label" style="color: var(--amber);">Org</div>
        <div class="arch-box">&#x1F465; All Users</div>
        <div class="arch-connector accent-amber" style="margin-top: 18px;"></div>
        <div class="arch-box">Any AI Client</div>
        <div class="arch-connector accent-amber wide" style="margin-top: 18px;"></div>
        <div class="luthien-col">
          <div class="arch-box luthien">Luthien</div>
          <div class="luthien-caption" style="white-space: nowrap;">follows company/team policy?</div>
        </div>
        <div class="arch-connector accent-amber wide" style="margin-top: 18px;"></div>
        <div class="arch-box">Any AI Provider</div>
      </div>
    </div>

    <div style="margin-top: 40px;">
      <span class="latency-badge">adds ~5-15ms</span>
    </div>
  </div>
</body>
</html>
